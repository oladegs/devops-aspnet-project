trigger:
- main

pool:
  name: 'Default'

variables:
  buildConfiguration: 'Release'
  artifactName: 'drop'

stages:
- stage: Build
  displayName: "Build Stage"
  jobs:
    - job: BuildJob
      displayName: "Build ASP.NET App"
      steps:
        - checkout: self

        - task: UseDotNet@2
          displayName: "Install .NET SDK"
          inputs:
            packageType: 'sdk'
            version: '8.0.x'

        - task: SonarCloudPrepare@3
          displayName: "Prepare SonarCloud Analysis"
          inputs:
            SonarCloud: 'sonarcloud-connection'
            organization: 'oladegs'
            scannerMode: 'dotnet'
            projectKey: 'oladegs_devops-aspnet-project'
            projectName: 'devops-aspnet-project'

        - script: dotnet restore
          displayName: "Restore Packages"

        - script: dotnet build --configuration $(buildConfiguration) --no-restore
          displayName: "Build Project"

        - script: dotnet test --configuration $(buildConfiguration) --no-build --collect:"XPlat Code Coverage"
          displayName: "Run Tests & Code Coverage"

        - task: SonarCloudAnalyze@3
          displayName: "Run SonarCloud Analysis"

        - task: SonarCloudPublish@3
          displayName: "Publish Quality Gate"
          inputs:
            pollingTimeoutSec: '300'

        - script: dotnet publish --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)
          displayName: "Publish App"

        - task: PublishBuildArtifacts@1
          displayName: "Publish Build Artifact"
          inputs:
            PathtoPublish: '$(Build.ArtifactStagingDirectory)'
            ArtifactName: '$(artifactName)'
            publishLocation: 'Container'

- stage: Deliver
  displayName: "Deliver Stage"
  dependsOn: Build
  jobs:
    - job: DeliverJob
      displayName: "Deliver Job"
      steps:
        - task: DownloadBuildArtifacts@1
          displayName: "Download Build Artifact"
          inputs:
            buildType: 'current'
            downloadType: 'single'
            artifactName: '$(artifactName)'
            downloadPath: '$(Pipeline.Workspace)'

        - script: echo "Releasing build artifacts..."
          displayName: "Release Step"

        - task: GitHubComment@0
          displayName: "Verify PAT GitHub Connection"
          inputs:
            gitHubConnection: 'github-pat-connection'
            repositoryName: 'oladegs/devops-aspnet-project'
            comment: 'Azure DevOps pipeline successfully used the PAT-based GitHub service connection.'

- stage: Dev
  displayName: "Deploy to Dev"
  dependsOn: Deliver
  jobs:
    - job: DevDeploy
      displayName: "Dev Deploy Job"
      steps:
        - task: DownloadBuildArtifacts@1
          displayName: "Download Build Artifact"
          inputs:
            buildType: 'current'
            downloadType: 'single'
            artifactName: '$(artifactName)'
            downloadPath: '$(Pipeline.Workspace)'

        - script: echo "Deploying to Dev Environment"
          displayName: "Deploy Dev"

- stage: QAT
  displayName: "Deploy to QAT"
  dependsOn: Dev
  jobs:
    - job: QATDeploy
      displayName: "QAT Deploy Job"
      steps:
        - task: DownloadBuildArtifacts@1
          displayName: "Download Build Artifact"
          inputs:
            buildType: 'current'
            downloadType: 'single'
            artifactName: '$(artifactName)'
            downloadPath: '$(Pipeline.Workspace)'

        - script: echo "Deploying to QAT Environment"
          displayName: "Deploy QAT"

- stage: Staging
  displayName: "Deploy to Staging"
  dependsOn: QAT
  jobs:
    - job: StagingDeploy
      displayName: "Staging Deploy Job"
      steps:
        - task: DownloadBuildArtifacts@1
          displayName: "Download Build Artifact"
          inputs:
            buildType: 'current'
            downloadType: 'single'
            artifactName: '$(artifactName)'
            downloadPath: '$(Pipeline.Workspace)'

        - script: echo "Deploying to Staging Environment"
          displayName: "Deploy Staging"

- stage: Production
  displayName: "Deploy to Production"
  dependsOn: Staging
  jobs:
    - job: ProdDeploy
      displayName: "Production Deploy Job"
      steps:
        - task: DownloadBuildArtifacts@1
          displayName: "Download Build Artifact"
          inputs:
            buildType: 'current'
            downloadType: 'single'
            artifactName: '$(artifactName)'
            downloadPath: '$(Pipeline.Workspace)'

        - script: echo "Deploying to Production Environment"
          displayName: "Deploy Production"