trigger:
- main

pool:
  name: 'Default' 

stages:
- stage: Build
  displayName: "Build Stage"
  jobs:
    - job: BuildJob
      displayName: "Build ASP.NET App"
      steps:
        - task: UseDotNet@2
          displayName: "Install .NET SDK"
          inputs:
            packageType: 'sdk'
            version: '8.0.x'

        - task: SonarCloudPrepare@3.4.3
          displayName: "Prepare SonarCloud Analysis"
          inputs:
            SonarCloud: 'sonarcloud-connection'
            organization: 'oladegs'
            scannerMode: 'dotnet'
            projectKey: 'oladegs_devops-aspnet-project'
            projectName: 'devops-aspnet-project'

        - script: dotnet build --configuration Release
          displayName: "Build Project"

        - script: dotnet test --collect:"XPlat Code Coverage"
          displayName: "Run Tests & Code Coverage"

        - task: SonarCloudAnalyze@3.4.3
          displayName: "Run SonarCloud Analysis"

        - task: SonarCloudPublish@3.4.3
          displayName: "Publish Quality Gate"
          inputs:
            pollingTimeoutSec: '300'

        # --- FIX 1: Package and Publish the Artifact ---
        - task: DotNetCoreCLI@2
          displayName: 'Publish and Zip Project'
          inputs:
            command: 'publish'
            publishWebProjects: true
            arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)'
            zipAfterPublish: true

        - task: PublishBuildArtifacts@1
          displayName: 'Publish Artifact: drop'
          inputs:
            PathtoPublish: '$(Build.ArtifactStagingDirectory)'
            ArtifactName: 'drop'
            publishLocation: 'Container'

- stage: Deliver
  displayName: "Deliver Stage"
  dependsOn: Build
  jobs:
    - job: DeliverJob
      displayName: "Deliver Job"
      steps:
        - script: echo "Releasing build artifacts..."
          displayName: "Release Step"

        - task: GitHubComment@0
          displayName: "Verify PAT GitHub Connection"
          inputs:
            gitHubConnection: 'github-pat-connection'
            repositoryName: 'oladegs/devops-aspnet-project'
            comment: 'Azure DevOps pipeline successfully used the PAT-based GitHub service connection.'

# --- FIX 2: Download and Deploy the Artifact for each Environment ---
- stage: Dev
  displayName: "Deploy to Dev"
  dependsOn: Deliver
  jobs:
    - job: DevDeploy
      displayName: "Dev Deploy Job"
      steps:
        - task: DownloadBuildArtifacts@0
          displayName: 'Download Artifact'
          inputs:
            buildType: 'current'
            downloadType: 'single'
            artifactName: 'drop'
            downloadPath: '$(System.ArtifactsDirectory)'
            
        - task: ExtractFiles@1
          displayName: "Extract and Deploy to Dev Folder"
          inputs:
            archiveFilePatterns: '$(System.ArtifactsDirectory)/drop/*.zip'
            destinationFolder: 'C:\Deployments\Dev'
            cleanDestinationFolder: true

- stage: QAT
  displayName: "Deploy to QAT"
  dependsOn: Dev
  jobs:
    - job: QATDeploy
      displayName: "QAT Deploy Job"
      steps:
        - task: DownloadBuildArtifacts@0
          displayName: 'Download Artifact'
          inputs:
            buildType: 'current'
            downloadType: 'single'
            artifactName: 'drop'
            downloadPath: '$(System.ArtifactsDirectory)'
            
        - task: ExtractFiles@1
          displayName: "Extract and Deploy to QAT Folder"
          inputs:
            archiveFilePatterns: '$(System.ArtifactsDirectory)/drop/*.zip'
            destinationFolder: 'C:\Deployments\QAT'
            cleanDestinationFolder: true

- stage: Staging
  displayName: "Deploy to Staging"
  dependsOn: QAT
  jobs:
    - job: StagingDeploy
      displayName: "Staging Deploy Job"
      steps:
        - task: DownloadBuildArtifacts@0
          displayName: 'Download Artifact'
          inputs:
            buildType: 'current'
            downloadType: 'single'
            artifactName: 'drop'
            downloadPath: '$(System.ArtifactsDirectory)'
            
        - task: ExtractFiles@1
          displayName: "Extract and Deploy to Staging Folder"
          inputs:
            archiveFilePatterns: '$(System.ArtifactsDirectory)/drop/*.zip'
            destinationFolder: 'C:\Deployments\Staging'
            cleanDestinationFolder: true

- stage: Production
  displayName: "Deploy to Production"
  dependsOn: Staging
  jobs:
    - job: ProdDeploy
      displayName: "Production Deploy Job"
      steps:
        - task: DownloadBuildArtifacts@0
          displayName: 'Download Artifact'
          inputs:
            buildType: 'current'
            downloadType: 'single'
            artifactName: 'drop'
            downloadPath: '$(System.ArtifactsDirectory)'
            
        - task: ExtractFiles@1
          displayName: "Extract and Deploy to Production Folder"
          inputs:
            archiveFilePatterns: '$(System.ArtifactsDirectory)/drop/*.zip'
            destinationFolder: 'C:\Deployments\Production'
            cleanDestinationFolder: true