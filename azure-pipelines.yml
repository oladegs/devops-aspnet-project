trigger:
- main

pool:
  vmImage: 'windows-latest'

stages:
- stage: Build
  displayName: "Build Stage"
  jobs:
    - job: BuildJob
      displayName: "Build ASP.NET App"
      steps:
        - task: UseDotNet@2
          displayName: "Install .NET SDK"
          inputs:
            packageType: 'sdk'
            version: '8.0.x'

        - task: SonarCloudPrepare@3
          displayName: "Prepare SonarCloud Analysis"
          inputs:
            SonarCloud: 'sonarcloud-connection'
            organization: 'oladegs'
            scannerMode: 'dotnet'
            projectKey: 'oladegs_devops-aspnet-project'
            projectName: 'devops-aspnet-project'

        - script: dotnet build --configuration Release
          displayName: "Build Project"

        - script: dotnet test --collect:"XPlat Code Coverage"
          displayName: "Run Tests & Code Coverage"

        - task: SonarCloudAnalyze@3
          displayName: "Run SonarCloud Analysis"

        - task: SonarCloudPublish@3
          displayName: "Publish Quality Gate"
          inputs:
            pollingTimeoutSec: '300'

- stage: Deliver
  displayName: "Deliver Stage"
  dependsOn: Build
  jobs:
    - job: DeliverJob
      displayName: "Deliver Job"
      steps:
        - script: echo "Releasing build artifacts..."
          displayName: "Release Step"

- stage: Dev
  displayName: "Deploy to Dev"
  dependsOn: Deliver
  jobs:
    - job: DevDeploy
      displayName: "Dev Deploy Job"
      steps:
        - script: echo "Deploying to Dev Environment"
          displayName: "Deploy Dev"

- stage: QAT
  displayName: "Deploy to QAT"
  dependsOn: Dev
  jobs:
    - job: QATDeploy
      displayName: "QAT Deploy Job"
      steps:
        - script: echo "Deploying to QAT Environment"
          displayName: "Deploy QAT"

- stage: Staging
  displayName: "Deploy to Staging"
  dependsOn: QAT
  jobs:
    - job: StagingDeploy
      displayName: "Staging Deploy Job"
      steps:
        - script: echo "Deploying to Staging Environment"
          displayName: "Deploy Staging"

- stage: Production
  displayName: "Deploy to Production"
  dependsOn: Staging
  jobs:
    - job: ProdDeploy
      displayName: "Production Deploy Job"
      steps:
        - script: echo "Deploying to Production Environment"
          displayName: "Deploy Production"